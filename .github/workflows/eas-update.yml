name: Deploy EAS Update
on:
  push:
    branches:
      - main # Triggers the deploy whenever you push to main branch

jobs:
  update:
    name: Deploy EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: VinyasApp/package-lock.json

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: |
          cd VinyasApp
          npm install

      - name: Publish Update
        run: |
          cd VinyasApp
          eas update --auto --branch production
