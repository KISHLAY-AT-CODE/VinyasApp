name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK & Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Expo / EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: npm install

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-keystore.jks
          echo "KEYSTORE_PATH=$(pwd)/android-keystore.jks" >> $GITHUB_ENV

      - name: Configure Gradle Signing
        run: |
          # Create a credentials.json for EAS local build
          cat > credentials.json << EOF
          {
            "android": {
              "keystore": {
                "keystorePath": "${{ env.KEYSTORE_PATH }}",
                "keystorePassword": "${{ secrets.KEYSTORE_PASSWORD }}",
                "keyAlias": "${{ secrets.KEY_ALIAS }}",
                "keyPassword": "${{ secrets.KEYSTORE_PASSWORD }}"
              }
            }
          }
          EOF

      - name: Build APK (EAS Local)
        run: |
          eas build --platform android --profile production --local --non-interactive --output ./VinyasSathi.apk

      - name: Extract Version from Tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          VERSION=${TAG_NAME#v}
          VERSION=${VERSION%-force}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Check if this is a forced update
          if [[ "$TAG_NAME" == *"-force"* ]]; then
            echo "forced=true" >> $GITHUB_OUTPUT
          else
            echo "forced=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Vinyas Sathi v${{ steps.version.outputs.version }}
          body: |
            ## Vinyas Sathi v${{ steps.version.outputs.version }}

            **Download the APK below and install it on your Android device.**

            The app will automatically detect this update and prompt users to install it.

            ${{ steps.version.outputs.forced == 'true' && '⚠️ **This is a forced update** — users will be required to update.' || '' }}
          draft: false
          prerelease: false
          files: |
            ./VinyasSathi.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Keystore
        if: always()
        run: |
          rm -f android-keystore.jks credentials.json
