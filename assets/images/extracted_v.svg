<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Logo Left Stem Gradient -->
    <linearGradient id="left-stem-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="60%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>

    <!-- Logo Right Ribbon 1 Gradient -->
    <linearGradient id="right-rib1-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>

    <!-- Logo Right Ribbon 2 Gradient -->
    <linearGradient id="right-rib2-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#db2777" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>

    <!-- Core Logo Glow -->
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Drop Shadow for Float Effect -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Extracted V Shape Centered -->
  <g filter="url(#drop-shadow)" transform="translate(12, -4)">
    <!-- Left Pillar of V -->
    <path d="M 172,130 C 172,130 186,190 216,285 C 222,305 235,340 244,360 C 246,364 250,364 252,360 C 255,354 262,330 268,310 L 220,170 C 214,152 196,130 172,130 Z" 
          fill="url(#left-stem-grad)" 
          filter="url(#logo-glow)" />

    <!-- Ribbon 1 (Lower Right Ascending Progress Track) -->
    <path d="M 234,324 C 252,310 290,265 315,225 C 328,205 332,192 332,184 C 332,176 324,170 316,170 C 304,170 290,188 274,212 L 242,260 Z" 
          fill="url(#right-rib1-grad)" />

    <!-- Ribbon 2 (Higher Right Ascending - Represents peak achievements & goals) -->
    <path d="M 264,260 C 288,230 330,172 356,134 C 368,116 374,104 374,96 C 374,86 364,80 354,80 C 342,80 326,98 308,124 L 272,178 Z" 
          fill="url(#right-rib2-grad)" />

    <!-- Glowing Apex/Star of Success -->
    <g transform="translate(366, 88)">
      <circle cx="0" cy="0" r="16" fill="#facc15" opacity="0.3" filter="url(#logo-glow)" />
      <path d="M 0,-8 L 2.5,-2.5 L 8,0 L 2.5,2.5 L 0,8 L -2.5,2.5 L -8,0 L -2.5,-2.5 Z" fill="#fef08a" />
    </g>
  </g>
</svg>
